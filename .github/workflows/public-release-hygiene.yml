name: Public release hygiene

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-release-hygiene:
    name: public-release-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run public release hygiene check
        run: bash bin/latch_public_release_check.sh
